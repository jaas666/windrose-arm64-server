services:
  windrose:
    image: ghcr.io/falcononrails/windrose-arm64-server:latest
    container_name: windrose-server
    build:
      context: .
    platform: linux/arm64
    network_mode: host
    restart: unless-stopped
    stop_grace_period: 30s
    ulimits:
      core:
        soft: 0
        hard: 0
    env_file:
      - .env
    volumes:
      - ./data/server:/server
      - ./data/versions:/versions
      - ./data/wine:/home/steam/.wine
    # Host networking avoids Docker bridge NAT interfering with Windrose ICE/P2P.
    # For Direct IP mode, open SERVER_PORT in the host and cloud firewall.
